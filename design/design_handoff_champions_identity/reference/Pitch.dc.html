<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="position:relative;width:100%;aspect-ratio:{{ ratio }};border-radius:10px;overflow:hidden;background:linear-gradient(160deg,#0d2a18,#0a2114);border:1px solid rgba(150,180,255,.25);box-shadow:0 24px 60px rgba(0,0,0,.5),inset 0 0 80px rgba(0,0,0,.35)">

  <!-- mow stripes -->
  <div style="position:absolute;inset:0;background:repeating-linear-gradient(180deg, rgba(255,255,255,.035) 0 9%, rgba(0,0,0,0) 9% 18%)"></div>
  <!-- glow -->
  <div style="position:absolute;top:-30%;left:50%;transform:translateX(-50%);width:80%;height:70%;background:radial-gradient(closest-side, rgba(63,118,255,.22), rgba(63,118,255,0) 70%);pointer-events:none"></div>

  <!-- pitch markings -->
  <div style="position:absolute;inset:18px;border:2px solid rgba(255,255,255,.16);border-radius:4px"></div>
  <div style="position:absolute;left:18px;right:18px;top:50%;height:2px;background:rgba(255,255,255,.16)"></div>
  <div style="position:absolute;left:50%;top:50%;width:120px;height:120px;border:2px solid rgba(255,255,255,.16);border-radius:50%;transform:translate(-50%,-50%)"></div>
  <div style="position:absolute;left:50%;top:50%;width:7px;height:7px;background:rgba(255,255,255,.4);border-radius:50%;transform:translate(-50%,-50%)"></div>
  <div style="position:absolute;left:50%;top:18px;width:150px;height:64px;border:2px solid rgba(255,255,255,.16);border-top:none;transform:translateX(-50%)"></div>
  <div style="position:absolute;left:50%;bottom:18px;width:150px;height:64px;border:2px solid rgba(255,255,255,.16);border-bottom:none;transform:translateX(-50%)"></div>

  <!-- players -->
  <sc-for list="{{ lineup }}" as="p" hint-placeholder-count="11">
    <div style="position:absolute;left:{{ p.left }};top:{{ p.top }};transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:5px;z-index:2">
      <div style="width:42px;height:42px;border-radius:50%;background:radial-gradient(circle at 35% 30%, #2a52b8, #0e2356);border:2px solid #5d8bff;display:flex;align-items:center;justify-content:center;font-family:'Saira',sans-serif;font-weight:800;font-size:15px;color:#fff;box-shadow:0 6px 16px rgba(0,0,0,.5),0 0 14px rgba(63,118,255,.5)">{{ p.n }}</div>
      <div style="font-family:'Saira',sans-serif;font-size:11px;font-weight:600;color:#eaf0ff;background:rgba(5,9,28,.7);padding:1px 7px;border-radius:3px;white-space:nowrap">{{ p.name }}</div>
    </div>
  </sc-for>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:420,&quot;height&quot;:560},&quot;lineup&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;any[]&quot;},&quot;horizontal&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;}}">
class Component extends DCLogic {
  renderVals(){
    const list = (this.props.lineup || []).map(p=>({
      n:p.n, name:p.name, left:p.x+'%', top:p.y+'%'
    }));
    return { lineup:list, ratio: this.props.horizontal ? '16 / 10' : '3 / 4' };
  }
}
</script>
</body>
</html>
